<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios HTMl</title>
</head>

<body>
    <header>
        <h1>Formularios Html - Ejemplos</h1>
        <hr>
    </header>
    <main>
        <h2>Formulario de Registro</h2>
        <p>completa los siguientes datos:</p>
        <form> <!-- etiqueta para crear un formulario -->
            <label>Nombre:</label> <!--etiqueta que describe al campo-->
            <input type="text" name="nombre" placeholder="Escribe tu nombre"> <!--campo de texto-->
            <br><br>
            <label>Correo electronico:</label>
            <input type="email" name="correo" placeholder="Escribe tu correo electronico">
            <br><br>
            <label>Contraseña:</label>
            <input type="password" name="contrasena" placeholder="Escribe tu contraseña"><!--formato de contraseña-->
            <br><br>
            <label>Edad:</label>
            <input type="number" name="edad" placeholder="Escribe tu edad"><!--admite solo números-->
            <br><br>
            <label>Fecha de nacimiento:</label>
            <input type="date" name="fecha_nacimiento">
            <br><br>
            <label>Género:</label>
            <select name="genero">
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
                <option value="otro">Otro</option>
            </select>
            <br><br>
            <label>Intereses:</label><br>
            <input type="checkbox" name="intereses" value="deportes"> Deportes<br>
            <input type="checkbox" name="intereses" value="musica"> Música<br>
            <input type="checkbox" name="intereses" value="Películas"> Películas
            <br><br>
            <label>Ciudad:</label><br>
            <select name="ciudad">
                <option value="ciudad1">Santiago</option>
                <option value="ciudad2">Valparaíso</option>
                <option value="ciudad3">Concepción</option>
                <option value="ciudad4">La Serena</option>
                <option value="ciudad5">Otros</option>
            </select>
            <br><br>
            <label>Comentarios:</label><br>
            <textarea name="comentarios" rows="4" cols="30"></textarea>
            <br><br>
            <label>Subir archivo:</label>
            <input type="file" name="archivo">
            <br><br>
            <label>Color Favorito:</label>
            <input type="color" name="color_favorito">
            <br><br>
            <label>Nivel de satisfacción:</label>
            <input type="range" name="satisfaccion" min="1" max="10">
            <br><br>
            <input type="submit" value="Enviar"> <!--boton para enviar el formulario-->
            <input type="reset" value="Limpiar"> <!--boton para limpiar el formulario-->
        </form>
        <!--creación de tabla de datos-->
        <h2>Tabla de usuarios</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Edad</th>
                </tr>
                <tr>
                    <td>Agustín</td>
                    <td>agustin@liceovvh.cl</td>
                    <td>16</td>
                </tr>
                <tr>
                    <td>Fernando</td>
                    <td>fernando@liceovvh.cl</td>
                    <td>15</td>
                </tr>
        </table>
    </main>
</body>

</html>
